project: WellFit EMR
imagemagick: true

environments:
  development:
    url: http://localhost:3001
    api_url: http://localhost:3000
    restrictions:
      - "Requires local dev server running (bun run dev:web and bun run dev:server)"
      - "Requires seed data for realistic testing (bun run seed)"
      - "SQLite database — single writer, stop server before seeding"

default_target: development

auth:
  method: email-password
  provider: Better Auth
  login_url: /login
  signup_enabled: true

personas:
  - name: admin
    description: "Administrador del sistema con acceso completo a gestion de usuarios y todas las funciones clinicas"
    email: seed@wellfit.local
    credentials_source: env-var
    secret_name: QA_ADMIN_PASSWORD
    test_focus:
      - admin user management
      - all clinical workflows
      - patient CRUD
      - encounters
      - clinical documents
      - medication orders
      - service requests
      - interconsultations
      - incapacity certificates
      - consents
      - attachments
      - facilities
      - catalogs
      - chat
    cannot_do:
      - "nothing — admin has full access"

  - name: user
    description: "Usuario estandar del sistema con acceso a funciones clinicas pero sin permisos de administracion"
    email: null
    credentials_source: manual
    secret_name: null
    test_focus:
      - patient CRUD
      - encounters
      - clinical documents
      - medication orders
      - service requests
      - interconsultations
      - incapacity certificates
      - consents
      - attachments
      - facilities
      - catalogs
      - chat
    cannot_do:
      - access admin user management page
      - create/ban/delete users
      - change user roles

  - name: new_user
    description: "Fresh signup, no existing data"
    email_pattern: "qa+signup_{RUN_ID}@wellfit.local"
    test_focus:
      - onboarding
      - empty states
      - first-run experience
      - signup flow

apps:
  web:
    path_patterns:
      - "apps/web/**"
      - "packages/ui/**"
    skill: qa-web
    test_tool: agent-browser
    build_command: "bun run build"
    dev_command: "bun run dev:web"

  server:
    path_patterns:
      - "apps/server/**"
      - "packages/api/**"
      - "packages/db/**"
      - "packages/auth/**"
    skill: qa-server
    test_tool: curl
    build_command: "bun run build"
    dev_command: "bun run dev:server"

feature_flags:
  provider: none
  dashboard_url: null
  how_to_override: "N/A — no feature flags configured"

integrations:
  ai:
    provider: AI SDK v6
    providers:
      - fireworks
      - google
    note: "Server-side only. QA should not test LLM responses for medical accuracy — test that the chat UI works and tools are invoked."
  auth:
    provider: Better Auth
    note: "Email/password with admin plugin. Session cookie-based."

cleanup:
  auto_cleanup: true
  strategy: reset-db
  instructions: "Run `bun run seed -- --clean` from the repo root to reset the database with fresh seed data. Stop the dev server first to avoid SQLite write conflicts."

failure_learning: suggest_in_report
