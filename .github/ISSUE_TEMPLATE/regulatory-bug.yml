name: Bug regulatorio
description: Incumplimiento normativo, datos incorrectos en RIPS/IHCE o pérdida de trazabilidad
title: "[Bug regulatorio] "
labels: ["bug", "compliance"]
body:
  - type: markdown
    attributes:
      value: |
        **Prioridad alta.** Incluir pasos de reproducción y export/payload si es RIPS.
  - type: textarea
    id: norms
    attributes:
      label: Norma o regla violada
      placeholder: "RVG12, Res. 1995 inmutabilidad, Ley 1581"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado (cumplimiento)
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: IDs de paciente / atención / export (anonimizados)
      placeholder: "ripsExportId, encounterId"
  - type: textarea
    id: logs
    attributes:
      label: Errores RIPS / validación / capturas
      description: Pegar issues de `RipsGenerationError` o panel preflight
  - type: dropdown
    id: severity
    attributes:
      label: Severidad regulatoria
      options:
        - P0 — Reporte incorrecto o fuga de datos
        - P1 — Riesgo alto de glosa / auditoría
        - P2 — Corregible sin reporte inmediato
    validations:
      required: true
